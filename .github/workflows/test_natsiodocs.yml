name: Test Examples NatsIODocs

on:
  pull_request: {}
  push:
    branches:
    - main

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      NUGET_XMLDOC_MODE: skip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Install nats-server
        run: go install github.com/nats-io/nats-server/v2@latest

      - name: Check nats-server
        run: nats-server -v

      - name: Build
        run: dotnet build examples/Example.NatsIODocs/Example.NatsIODocs.csproj -c Release

      - name: Run examples
        shell: bash
        run: |
          nats-server &
          sleep 2
          set -e

          PROJ=examples/Example.NatsIODocs/Example.NatsIODocs.csproj
          # getting-started-{publish,subscribe} target demo.nats.io and the
          # subscribe variant blocks waiting for messages, so they are not
          # exercised at runtime here. Their build is covered above.
          for ex in \
            basics-publish \
            basics-subscribe \
            subjects-single-wildcard \
            subjects-multi-wildcard \
            subjects-monitoring \
            queue-groups-basic \
            queue-groups-dynamic-scaling \
            queue-groups-request-reply \
            queue-groups-mixed-subscribers \
            request-reply-basic \
            request-reply-timeout \
            request-reply-multiple-responders \
            request-reply-no-responders \
            request-reply-headers \
            request-reply-calculator
          do
            echo "::group::$ex"
            dotnet run --project $PROJ -c Release --no-build -- $ex
            echo "::endgroup::"
          done
